name: smoke

# Fast, offline sanity check: every experiment subcommand runs end-to-end on
# tiny synthetic data (no datasets, GPU, or API keys required).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r deployment/requirements.txt httpx
          pip install pytest

      - name: Run smoke tests (experiments + deployment)
        run: pytest -q tests/
