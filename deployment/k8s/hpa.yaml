# Horizontal Pod Autoscaler for the shadow scorer. The scorer is CPU-bound, so
# scale on CPU utilization to keep batch latency within the 100 ms telemetry
# cadence under load.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kac-shadow-scorer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kac-shadow-scorer
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
